<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flappy Cow</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="menu">
        <h1>🐄 Flappy Cow</h1>

        <p>Fliege mit der Kuh zwischen den Hochhäusern hindurch!</p>

        <button id="playBtn">▶ Spielen</button>

        <div id="bestScore">
            Highscore: <span id="best">0</span>
        </div>
    </div>

    <canvas id="game"></canvas>

    <div id="gameOver">
        <h2>Game Over</h2>

        <p>
            Score: <span id="score">0</span>
        </p>

        <button id="restartBtn">Nochmal spielen</button>
    </div>

    <script src="game.js"></script>

</body>
</html>
